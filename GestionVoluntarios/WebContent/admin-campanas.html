<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Campañas - VoluntariosBAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --banco-orange: #F36C21;
            --banco-dark-blue: #2E3D4C;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: #f0f2f5; }
        .btn { padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: 600; transition: all 0.2s; font-size: 0.875rem; line-height: 1.25rem; }
        .btn-primary { background-color: var(--banco-orange); color: white; }
        .btn-primary:hover { background-color: #d85b1a; }
        .btn-secondary { background-color: var(--banco-dark-blue); color: white; }
        .btn-secondary:hover { background-color: #1f2a35; }
        .btn-success { background-color: #16a34a; color: white; }
        .btn-success:hover { background-color: #15803d; }
        .btn-warning { background-color: #f59e0b; color: white; } /* Color para desactivar */
        .btn-warning:hover { background-color: #d97706; }
        .btn-danger { background-color: #dc2626; color: white; }
        .btn-danger:hover { background-color: #b91c1c; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); z-index: 40; display: flex; align-items: center; justify-content: center; }
        .modal-content { background-color: white; padding: 2rem; border-radius: 0.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 90%; max-width: 500px; }
        .input-label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; font-weight: 500; color: #374151; }
        .form-input { width: 100%; padding: 0.5rem; border: 1px solid #D1D5DB; border-radius: 0.375rem; }
    </style>
    <script src="/VoluntariosBAS/js/config.js"></script>
</head>
<body class="min-h-screen">

    <!-- Cabecera -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <img src="images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo" class="h-12 w-auto">
                <span class="ml-4 text-xl font-bold text-gray-700">Gestión de Campañas</span>
            </div>
            <div>
                <a href="admin.html" class="px-4 py-2 text-gray-600 hover:text-orange-600">Volver al Panel</a>
            </div>
        </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="container mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Campañas</h1>
            <button onclick="openModal()" class="btn btn-primary">Crear Nueva Campaña</button>
        </div>

        <div id="message-container" class="mb-4"></div>

        <!-- Tabla de Campañas -->
        <div class="bg-white shadow-md rounded-lg overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Campaña</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Denominación</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fechas</th>
                        <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody id="campaigns-table-body" class="bg-white divide-y divide-gray-200">
                    <!-- Las filas se insertarán aquí dinámicamente -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal para Crear/Editar Campaña -->
    <div id="campaign-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="modal-title" class="text-2xl font-bold mb-6">Nueva Campaña</h3>
            <form id="campaign-form" onsubmit="handleSave(event)">
                <input type="hidden" id="isUpdate" name="isUpdate" value="false">
                <div class="space-y-4">
                    <div>
                        <label for="campanaId" class="input-label">Código de Campaña</label>
                        <input type="text" id="campanaId" name="campanaId" class="form-input" required>
                    </div>
                    <div>
                        <label for="denominacion" class="input-label">Denominación</label>
                        <input type="text" id="denominacion" name="denominacion" class="form-input" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="fecha1" class="input-label">Fecha 1</label>
                            <input type="date" id="fecha1" name="fecha1" class="form-input" required>
                        </div>
                        <div>
                            <label for="fecha2" class="input-label">Fecha 2</label>
                            <input type="date" id="fecha2" name="fecha2" class="form-input" required>
                        </div>
                    </div>
                    <div>
                        <label for="turnospordia" class="input-label">Turnos por Día</label>
                        <input type="number" id="turnospordia" name="turnospordia" class="form-input" min="1" value="2" required>
                    </div>
                    <div>
                        <label for="comentarios" class="input-label">Comentarios</label>
                        <textarea id="comentarios" name="comentarios" rows="3" class="form-input"></textarea>
                    </div>
                </div>
                <div class="flex justify-end space-x-4 mt-8">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Campaña</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        let campaignsData = {};

        document.addEventListener('DOMContentLoaded', loadCampaigns);

        async function loadCampaigns() {
            try {
                const response = await fetch(AppConfig.getUrl('ADMIN_CAMPANAS'));
                if (!response.ok) {
                    if (response.status === 403) window.location.href = 'login.html';
                    throw new Error('Error al cargar las campañas.');
                }
                const campaigns = await response.json();
                const tableBody = document.getElementById('campaigns-table-body');
                tableBody.innerHTML = '';
                campaignsData = {};

                if (campaigns.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-4">No hay campañas creadas.</td></tr>';
                    return;
                }

                campaigns.forEach(c => {
                    campaignsData[c.campana] = c;
                    const tr = document.createElement('tr');
                    
                    const actionButton = c.estado === 'S'
                        ? `<button onclick='handleDeactivate("${c.campana}")' class="btn btn-warning">Desactivar</button>`
                        : `<button onclick='handleActivate("${c.campana}")' class="btn btn-success">Activar</button>`;

                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-medium text-gray-900">${c.campana}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${c.denominacion}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${new Date(c.fecha1).toLocaleDateString('es-ES')} - ${new Date(c.fecha2).toLocaleDateString('es-ES')}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-center">
                            ${c.estado === 'S' 
                                ? '<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Activa</span>' 
                                : '<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">Inactiva</span>'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                            ${actionButton}
                            <button onclick='openModal("${c.campana}")' class="btn btn-secondary">Editar</button>
                            <button onclick='handleDelete("${c.campana}")' class="btn btn-danger">Eliminar</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                displayMessage(error.message, 'error');
            }
        }

        function openModal(campaignId = null) {
            const form = document.getElementById('campaign-form');
            form.reset();
            const modalTitle = document.getElementById('modal-title');
            const campanaIdInput = document.getElementById('campanaId');
            const isUpdateInput = document.getElementById('isUpdate');

            if (campaignId) {
                const campaign = campaignsData[campaignId];
                modalTitle.textContent = 'Editar Campaña';
                isUpdateInput.value = 'true';
                campanaIdInput.value = campaign.campana;
                campanaIdInput.readOnly = true;
                document.getElementById('denominacion').value = campaign.denominacion;
                document.getElementById('fecha1').value = campaign.fecha1;
                document.getElementById('fecha2').value = campaign.fecha2;
                document.getElementById('turnospordia').value = campaign.turnospordia;
                document.getElementById('comentarios').value = campaign.comentarios;
            } else {
                modalTitle.textContent = 'Nueva Campaña';
                isUpdateInput.value = 'false';
                campanaIdInput.readOnly = false;
            }
            document.getElementById('campaign-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('campaign-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        async function handleSave(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            formData.append('action', 'save');

            try {
                const response = await fetch(AppConfig.getUrl('ADMIN_CAMPANAS'), {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });
                const result = await response.json();
                if (response.ok) {
                    displayMessage(result.message, 'success');
                    closeModal();
                    loadCampaigns();
                } else {
                    throw new Error(result.message || 'Error desconocido');
                }
            } catch (error) {
                displayMessage(error.message, 'error');
            }
        }

        async function handleDelete(campanaId) {
            if (!confirm(`¿Estás seguro de que quieres eliminar la campaña "${campanaId}"? Esta acción no se puede deshacer.`)) {
                return;
            }
            
            const formData = new URLSearchParams();
            formData.append('action', 'delete');
            formData.append('campanaId', campanaId);

            try {
                const response = await fetch(AppConfig.getUrl('ADMIN_CAMPANAS'), {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    displayMessage(result.message, 'success');
                    loadCampaigns();
                } else {
                    throw new Error(result.message || 'Error desconocido');
                }
            } catch (error) {
                displayMessage(error.message, 'error');
            }
        }

        async function handleActivate(campanaId) {
            const formData = new URLSearchParams();
            formData.append('action', 'activate');
            formData.append('campanaId', campanaId);

            try {
                const response = await fetch(AppConfig.getUrl('ADMIN_CAMPANAS'), {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    displayMessage(result.message, 'success');
                    loadCampaigns();
                } else {
                    throw new Error(result.message || 'Error desconocido');
                }
            } catch (error) {
                displayMessage(error.message, 'error');
            }
        }
        
        async function handleDeactivate(campanaId) {
            const formData = new URLSearchParams();
            formData.append('action', 'deactivate');
            formData.append('campanaId', campanaId);

            try {
                const response = await fetch(AppConfig.getUrl('ADMIN_CAMPANAS'), {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    displayMessage(result.message, 'success');
                    loadCampaigns();
                } else {
                    throw new Error(result.message || 'Error desconocido');
                }
            } catch (error) {
                displayMessage(error.message, 'error');
            }
        }

        function displayMessage(msg, type) {
            const container = document.getElementById('message-container');
            const colors = {
                success: 'bg-green-100 border-green-400 text-green-700',
                error: 'bg-red-100 border-red-400 text-red-700'
            };
            container.innerHTML = `<div class="border px-4 py-3 rounded relative ${colors[type]}" role="alert">
                                       <span class="block sm:inline">${msg}</span>
                                   </div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }
    </script>
</body>
</html>
