<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Banco de Alimentos de Sevilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f0f4f8; }
        .card-shadow { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
        .btn-orange { background-color: #f97316; transition: background-color 0.2s; }
        .btn-orange:hover { background-color: #ea580c; }
        .btn-secondary { background-color: #4b5563; transition: background-color 0.2s; }
        .btn-secondary:hover { background-color: #374151; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 space-y-8 bg-white rounded-2xl card-shadow m-4">
        <div class="flex justify-center">
            <img src="images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo" class="w-48">
        </div>
        
        <h2 class="text-2xl font-bold text-center text-gray-800">Acceso de Voluntarios</h2>
        
        <form id="loginForm" class="mt-8 space-y-6" onsubmit="handleLogin(event)">
            <div class="space-y-4">
                <input id="usuario" name="usuario" type="text" required class="block w-full px-3 py-3 border border-gray-300 rounded-md focus:ring-orange-500 focus:border-orange-500 sm:text-sm" placeholder="DNI / NIE">
                <input id="clave" name="clave" type="password" required class="block w-full px-3 py-3 border border-gray-300 rounded-md focus:ring-orange-500 focus:border-orange-500 sm:text-sm" placeholder="Contraseña">
            </div>

            <div class="flex items-center justify-end text-sm">
                <a href="recuperar-clave.html" class="font-medium text-orange-600 hover:text-orange-500">
                    ¿Has olvidado tu contraseña?
                </a>
            </div>

            <button type="submit" id="submit-button" class="w-full flex justify-center py-3 px-4 text-sm font-medium text-white rounded-md btn-orange shadow-md">
                Iniciar Sesión
            </button>
        </form>
        
        <div class="text-center pt-4 border-t">
            <button onclick="window.location.href='mapa-almacenes.html'" class="w-full px-4 py-3 text-sm font-medium text-white rounded-md btn-secondary">
                Registrarme como Voluntario
            </button>
        </div>

        <div id="message" class="hidden p-4 mt-4 text-sm text-center text-white rounded-md"></div>
    </div>
    
    <script src="/VoluntariosBAS/js/config.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault(); 
            const form = event.target;
            const formData = new FormData(form);
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submit-button');

            messageDiv.textContent = 'Verificando...';
            messageDiv.className = 'p-4 mt-4 text-sm text-center text-white rounded-md bg-blue-500';
            messageDiv.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const response = await fetch(AppConfig.getUrl('LOGIN'), {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });
                
                const result = await response.json();

                if (result.success) {
                    messageDiv.textContent = 'Acceso correcto. Redirigiendo...';
                    messageDiv.className = 'p-4 mt-4 text-sm text-center text-white rounded-md bg-green-500';
                    
                    setTimeout(() => {
                        if (result.isAdmin) {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'asignar-turnos.html';
                        }
                    }, 800);

                } else {
                    messageDiv.textContent = result.message || 'Usuario o contraseña incorrectos.';
                    messageDiv.className = 'p-4 mt-4 text-sm text-center text-white rounded-md bg-red-500';
                    submitBtn.disabled = false;
                }
            } catch (error) {
                messageDiv.textContent = 'Error de conexión con el servidor.';
                messageDiv.className = 'p-4 mt-4 text-sm text-center text-white rounded-md bg-red-500';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
