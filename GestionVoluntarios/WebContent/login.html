<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Banco de Alimentos de Sevilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="/VoluntariosBAS/js/config.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 space-y-8 bg-white rounded-2xl card-shadow m-4">
        <div class="flex justify-center">
            <img src="images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo del Banco de Alimentos de Sevilla" class="w-48">
        </div>
        
        <h2 class="text-2xl font-bold text-center text-gray-800">Acceso de Voluntarios</h2>
        
        <form id="loginForm" class="mt-8 space-y-6" onsubmit="handleLogin(event)">
            <div class="space-y-4 rounded-md">
                <div>
                    <label for="usuario" class="sr-only">Usuario</label>
                    <input id="usuario" name="usuario" type="text" required class="relative block w-full px-3 py-3 text-gray-900 placeholder-gray-500 border rounded-md appearance-none form-input focus:z-10 sm:text-sm" placeholder="Nombre de usuario">
                </div>
                <div>
                    <label for="clave" class="sr-only">Contraseña</label>
                    <input id="clave" name="clave" type="password" required class="relative block w-full px-3 py-3 text-gray-900 placeholder-gray-500 border rounded-md appearance-none form-input focus:z-10 sm:text-sm" placeholder="Contraseña">
                </div>
            </div>

            <div>
                <button type="submit" class="relative flex justify-center w-full px-4 py-3 text-sm font-medium text-white border border-transparent rounded-md btn-orange group focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500">
                    Iniciar Sesión
                </button>
            </div>
        </form>
        
        <div class="text-center">
            <p class="text-sm text-gray-600">¿Aún no eres voluntario?</p>
            <button onclick="window.location.href='mapa-almacenes.html'" class="w-full px-4 py-3 mt-2 text-sm font-medium text-white border border-transparent rounded-md btn-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500">
                Crear cuenta de Voluntario
            </button>
        </div>

        <!-- CAMBIO: Añadidos los enlaces de recuperación y ayuda -->
        <div class="text-center text-sm mt-6 pt-4 border-t">
            <a href="recuperar-clave.html" class="font-medium text-gray-600 hover:text-orange-500">
                He olvidado mi contraseña
            </a>
            <span class="text-gray-300 mx-2">|</span>
            <a href="ayuda-admin.html" class="font-medium text-gray-600 hover:text-orange-500">
                ¿Problemas para acceder?
            </a>
        </div>
        
        <div id="message" class="hidden p-4 mt-4 text-sm text-center text-white rounded-md"></div>

    </div>
    
    <script src="js/config.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault(); 

            const form = event.target;
            const formData = new FormData(form);
            const messageDiv = document.getElementById('message');

            messageDiv.textContent = 'Verificando...';
            messageDiv.className = 'p-4 mt-4 text-sm text-center text-white rounded-md bg-blue-500';
            messageDiv.classList.remove('hidden');

            try {
                const response = await fetch(AppConfig.getUrl('LOGIN'), {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });

                const result = await response.json();

                if (result.success) {
                    messageDiv.textContent = '¡Login correcto! Redirigiendo...';
                    messageDiv.className = 'p-4 mt-4 text-sm text-center text-white rounded-md bg-green-500';
                    
                    setTimeout(() => {
                        if (result.isAdmin) {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'asignar-turnos.html';
                        }
                    }, 1500);

                } else {
                    messageDiv.textContent = result.message || 'Error desconocido.';
                    messageDiv.className = 'p-4 mt-4 text-sm text-center text-white rounded-md bg-red-500';
                }

            } catch (error) {
            	console.error('Error al conectar con el servidor:', error);
                messageDiv.textContent = 'No se pudo conectar con el servidor. Inténtalo más tarde.';
                messageDiv.className = 'p-4 mt-4 text-sm text-center text-white rounded-md bg-red-500';
            }
            
            messageDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
