<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Cuenta- Banco de Alimentos de Sevilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="/Voluntarios Banco de Alimentos de Sevilla/js/config.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-2xl card-shadow m-4 text-center">
        <div class="flex justify-center">
            <img src="images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo del Banco de Alimentos de Sevilla" class="w-48">
        </div>
        
        <div>
            <h2 id="status-title" class="text-2xl font-bold text-gray-800">Verificando tu cuenta...</h2>
            <p id="status-message" class="mt-2 text-gray-600">Por favor, espera un momento.</p>
        </div>
        
        <div id="action-button-container" class="hidden pt-4">
            <a href="login.html" id="action-button" class="inline-block w-full px-4 py-3 text-sm font-medium text-white border border-transparent rounded-md btn-primary">
                Ir a Iniciar Sesión
            </a>
        </div>
    </div>

    <!-- CAMBIO: Incluir el fichero de configuración -->
    <script src="js/config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            const titleEl = document.getElementById('status-title');
            const messageEl = document.getElementById('status-message');
            const buttonContainerEl = document.getElementById('action-button-container');

            if (!token) {
                titleEl.textContent = 'Error de Verificación';
                messageEl.textContent = 'El enlace de verificación no es válido o está incompleto. Por favor, utiliza el enlace exacto de tu correo electrónico.';
                return;
            }

            try {
                // CAMBIO: Usar la URL del fichero de configuración
                const response = await fetch(AppConfig.getUrl('VERIFICAR_EMAIL'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `token=${encodeURIComponent(token)}`
                });

                const result = await response.json();

                if (result.success) {
                    titleEl.textContent = '¡Cuenta Verificada!';
                    titleEl.classList.add('text-green-600');
                    messageEl.textContent = result.message;
                    buttonContainerEl.classList.remove('hidden');
                } else {
                    titleEl.textContent = 'Error de Verificación';
                    titleEl.classList.add('text-red-600');
                    messageEl.textContent = result.message;
                }

            } catch (error) {
                console.error('Error en la solicitud de verificación:', error);
                titleEl.textContent = 'Error de Conexión';
                messageEl.textContent = 'No se pudo conectar con el servidor para verificar tu cuenta. Por favor, inténtalo de nuevo más tarde.';
            }
        });
    </script>
</body>
</html>
