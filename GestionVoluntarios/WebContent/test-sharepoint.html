<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Conexión con SharePoint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Rutas relativas corregidas -->
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .table-auto th, .table-auto td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; white-space: nowrap; }
        .table-auto th { background-color: #f7fafc; font-weight: bold; position: sticky; top: 0; z-index: 1; }
        #resultList { max-height: 60vh; overflow: auto; position: relative; }
        #resultList::-webkit-scrollbar { -webkit-appearance: none; height: 12px; width: 12px; }
        #resultList::-webkit-scrollbar-thumb { background-color: #a0aec0; border-radius: 6px; border: 2px solid #edf2f7; }
        #resultList::-webkit-scrollbar-track { background-color: #edf2f7; }
        #crudModal.hidden { display: none; }
        .lookup-id {
            color: #718096; /* gray-600 */
            font-style: italic;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="mx-4 sm:mx-8 md:mx-16 my-10 p-8 bg-white rounded-lg shadow-md">
        
        <div class="flex justify-center mb-6">
            <img src="images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo del Banco de Alimentos de Sevilla" class="w-48">
        </div>

        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Gestor Básico de Listas de SharePoint</h1>
            <p class="text-md text-gray-600 mt-1">Consulta, crea, edita y borra elementos de listas.</p>
        </div>

        <form id="sharepointForm" class="max-w-4xl mx-auto">
             <div class="mb-4">
                <label for="siteSelection" class="block text-sm font-medium text-gray-700">Sitio de SharePoint:</label>
                <select id="siteSelection" name="siteSelection" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                    <option value="voluntarios">Voluntarios</option>
                    <option value="informatica">Informática</option>
                </select>
            </div>
            <div class="mb-4">
                <label for="lista" class="block text-sm font-medium text-gray-700">Nombre o ID de la Lista:</label>
                <input type="text" id="lista" name="lista" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Ej: MiListaDePrueba">
            </div>
            <div class="mt-4 flex justify-center">
                <button type="submit" class="w-full sm:w-auto px-6 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-[#F36C21] hover:bg-[#d85b1a] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500">
                    Consultar
                </button>
            </div>
        </form>

        <div id="result" class="mt-8">
            <div id="loading" class="text-center hidden">
                <p class="text-lg text-gray-600">Cargando...</p>
            </div>
            <div id="error" class="text-center text-red-500 hidden"></div>
            <div id="resultList" class="shadow-md rounded-lg overflow-x-auto"></div>
        </div>
         <div class="mt-4 text-center">
            <button id="createItemBtn" class="hidden px-6 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                Crear Nuevo Elemento
            </button>
        </div>
    </div>

    <!-- Modal para CRUD -->
    <div id="crudModal" class="hidden fixed z-10 inset-0 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity" aria-hidden="true">
                <div class="absolute inset-0 bg-gray-500 opacity-75"></div>
            </div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <form id="crudForm">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <div class="sm:flex sm:items-start">
                            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                                <h3 class="text-lg leading-6 font-medium text-gray-900" id="modalTitle">Crear/Editar Elemento</h3>
                                <div class="mt-2" id="crudFormFields">
                                    <!-- Campos del formulario se insertarán aquí -->
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                        <button type="submit" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm">
                            Guardar
                        </button>
                        <button type="button" id="cancelBtn" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:w-auto sm:text-sm">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('sharepointForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const site = document.getElementById('siteSelection').value;
            const list = document.getElementById('lista').value;
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const resultList = document.getElementById('resultList');
            const createBtn = document.getElementById('createItemBtn');

            loading.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            resultList.innerHTML = '';
            createBtn.classList.add('hidden');
            
            const servletUrl = AppConfig.getUrl('SHAREPOINT_LIST');
            
            fetch(`${servletUrl}?siteSelection=${site}&lista=${list}`)
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(err.error || 'Error del servidor'); });
                    }
                    return response.json();
                })
                .then(data => {
                    loading.classList.add('hidden');
                    if (data.error) {
                        throw new Error(data.error);
                    }
                    if (data.items) {
                        handleListItemsView(data);
                    } else {
                        handleListOfListsView(data);
                    }
                })
                .catch(error => {
                    loading.classList.add('hidden');
                    errorDiv.textContent = 'Error: ' + error.message;
                    errorDiv.classList.remove('hidden');
                });
        });

        function handleListOfListsView(data) {
            const displayNames = data.map(item => ({ Nombre: item.Nombre, ID: item.ID }));
            document.getElementById('resultList').innerHTML = createTable(displayNames, ['Nombre', 'ID']);
        }

        function handleListItemsView(response) {
            const items = response.items;
            const columns = response.columns; 
            
            document.getElementById('resultList').innerHTML = createTable(items, columns);
            document.getElementById('createItemBtn').classList.remove('hidden');
        }

        function createTable(data, columns) {
            if (!data || data.length === 0) {
                return '<p class="text-center text-gray-500">No se encontraron datos.</p>';
            }

            const isItemView = typeof columns[0] === 'object';
            const internalNames = isItemView ? columns.map(c => c.internalName) : columns;

            let table = '<table class="min-w-full table-auto">';
            
            table += '<thead><tr>';
            columns.forEach(column => {
                let displayName = isItemView ? column.displayName : column;
                if (isItemView && column.isLookup) {
                    displayName += ' (ID)';
                }
                table += `<th class="px-4 py-2">${displayName}</th>`;
            });
            table += '</tr></thead>';

            table += '<tbody>';
            data.forEach(row => {
                table += '<tr>';
                internalNames.forEach((key, index) => {
                    const value = row[key] !== null && row[key] !== undefined ? row[key] : '';
                    let cellClass = '';
                    if (isItemView && columns[index] && columns[index].isLookup) {
                        cellClass = 'lookup-id';
                    }
                    table += `<td class="px-4 py-2 ${cellClass}">${value}</td>`;
                });
                table += '</tr>';
            });
            table += '</tbody></table>';

            return table;
        }

    </script>
</body>
</html>
