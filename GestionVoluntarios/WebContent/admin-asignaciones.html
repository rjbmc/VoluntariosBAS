<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Asignaciones- Banco de Alimentos de Sevilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="/Voluntarios Banco de Alimentos de Sevilla/js/config.js"></script>
</head>
<body class="min-h-screen">

    <!-- Cabecera -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <img src="images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo" class="h-12 w-auto">
                <span class="ml-4 text-xl font-bold text-gray-700">Consulta de Asignaciones</span>
            </div>
            <div>
                <a href="admin.html" class="px-4 py-2 text-gray-600 hover:text-orange-600">Volver al Panel</a>
            </div>
        </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="container mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Asignaciones de la Campaña Activa</h1>
        </div>

        <div id="message-container" class="mb-4"></div>

        <!-- Tabla de Asignaciones -->
        <div class="bg-white shadow-md rounded-lg overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="table-cell text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Voluntario</th>
                        <th class="table-cell-wrap text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Turno 1</th>
                        <th class="table-cell-wrap text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Turno 2</th>
                        <th class="table-cell-wrap text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Turno 3</th>
                        <th class="table-cell-wrap text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Turno 4</th>
                    </tr>
                </thead>
                <tbody id="asignaciones-table-body" class="bg-white divide-y divide-gray-200">
                    <!-- Las filas se insertarán aquí dinámicamente -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- CAMBIO: Incluir el fichero de configuración -->
    <script src="js/config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadAsignaciones);

        async function loadAsignaciones() {
            try {
                // CAMBIO: Usar la URL del fichero de configuración
                const response = await fetch(AppConfig.getUrl('ADMIN_ASIGNACIONES'));
                if (!response.ok) {
                    if (response.status === 403) window.location.href = 'login.html';
                    throw new Error('Error al cargar las asignaciones.');
                }
                const asignaciones = await response.json();
                const tableBody = document.getElementById('asignaciones-table-body');
                tableBody.innerHTML = '';

                if (asignaciones.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-4">No hay voluntarios asignados a la campaña activa.</td></tr>';
                    return;
                }

                asignaciones.forEach(a => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="table-cell">
                            <div class="text-sm font-medium text-gray-900">${a.apellidos}, ${a.nombre}</div>
                            <div class="text-sm text-gray-500">${a.usuario}</div>
                        </td>
                        <td class="table-cell-wrap text-sm text-gray-700">${formatTurno(a.tiendaTurno1, a.comentario1)}</td>
                        <td class="table-cell-wrap text-sm text-gray-700">${formatTurno(a.tiendaTurno2, a.comentario2)}</td>
                        <td class="table-cell-wrap text-sm text-gray-700">${formatTurno(a.tiendaTurno3, a.comentario3)}</td>
                        <td class="table-cell-wrap text-sm text-gray-700">${formatTurno(a.tiendaTurno4, a.comentario4)}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                displayMessage(error.message, 'error');
            }
        }

        function formatTurno(tienda, comentario) {
            if (!tienda) {
                return '<span class="text-gray-400">--</span>';
            }
            let html = `<strong class="text-gray-900">${tienda}</strong>`;
            if (comentario) {
                html += `<br><span class="text-xs text-gray-500">${comentario}</span>`;
            }
            return html;
        }

        function displayMessage(msg, type) {
            const container = document.getElementById('message-container');
            const colors = {
                error: 'bg-red-100 border-red-400 text-red-700'
            };
            container.innerHTML = `<div class="border px-4 py-3 rounded relative ${colors[type]}" role="alert">
                                       <span class="block sm:inline">${msg}</span>
                                   </div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }
    </script>
</body>
</html>
