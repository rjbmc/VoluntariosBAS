<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Voluntarios - Banco de Alimentos de Sevilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="/VoluntariosBAS/js/config.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen py-12">

    <div class="w-full max-w-3xl p-8 space-y-6 bg-white rounded-2xl card-shadow m-4">
        <div class="flex justify-center">
            <img src="images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo del Banco de Alimentos de Sevilla" class="w-48">
        </div>
        
        <h2 class="text-2xl font-bold text-center text-gray-800">Alta de Nuevo Voluntario</h2>
        
        <div id="tienda-seleccionada-info" class="p-3 text-center bg-green-100 text-green-800 rounded-lg hidden">
            <p>Punto de recogida seleccionado: <strong id="nombre-tienda"></strong></p>
        </div>

        <form id="registroForm" class="mt-8 space-y-6" onsubmit="return false;">
            <input type="hidden" id="punto_id" name="punto_id">

            <div class="grid grid-cols-1 gap-x-8 gap-y-6 md:grid-cols-2">
                <div>
                    <label for="nombre" class="input-label" aria-label="Nombre">Nombre</label>
                    <input id="nombre" name="nombre" type="text" required class="form-input relative block w-full px-3 py-2 text-gray-900 placeholder-gray-500 border rounded-md appearance-none sm:text-sm" placeholder="Tu nombre" aria-required="true">
                    <div id="error-nombre" class="text-red-600 text-xs mt-1 hidden"></div>
                </div>
                <div>
                    <label for="apellidos" class="input-label" aria-label="Apellidos">Apellidos</label>
                    <input id="apellidos" name="apellidos" type="text" required class="form-input relative block w-full px-3 py-2 text-gray-900 placeholder-gray-500 border rounded-md appearance-none sm:text-sm" placeholder="Tus apellidos" aria-required="true">
                    <div id="error-apellidos" class="text-red-600 text-xs mt-1 hidden"></div>
                </div>
                <div>
                    <label for="dni" class="input-label" aria-label="DNI / NIF">DNI / NIF</label>
                    <input id="dni" name="dni" type="text" maxlength="9" required class="form-input relative block w-full px-3 py-2 text-gray-900 placeholder-gray-500 border rounded-md appearance-none sm:text-sm" placeholder="12345678A" aria-required="true">
                    <div id="error-dni" class="text-red-600 text-xs mt-1 hidden"></div>
                </div>
                <div>
                    <label for="fechaNacimiento" class="input-label" aria-label="Fecha de Nacimiento">Fecha de Nacimiento</label>
                    <input id="fechaNacimiento" name="fechaNacimiento" type="date" required class="form-input relative block w-full px-3 py-2 text-gray-900 placeholder-gray-500 border rounded-md appearance-none sm:text-sm" aria-required="true">
                    <div id="error-fechaNacimiento" class="text-red-600 text-xs mt-1 hidden"></div>
                </div>
                <div>
                    <label for="email" class="input-label" aria-label="Correo Electrónico">Correo Electrónico</label>
                    <input id="email" name="email" type="email" required class="form-input relative block w-full px-3 py-2 text-gray-900 placeholder-gray-500 border rounded-md appearance-none sm:text-sm" placeholder="tu@email.com" aria-required="true">
                    <div id="error-email" class="text-red-600 text-xs mt-1 hidden"></div>
                </div>
                <div>
                    <label for="telefono" class="input-label" aria-label="Teléfono">Teléfono</label>
                    <input id="telefono" name="telefono" type="tel" maxlength="11" required class="form-input relative block w-full px-3 py-2 text-gray-900 placeholder-gray-500 border rounded-md appearance-none sm:text-sm" placeholder="600112233" aria-required="true">
                    <div id="error-telefono" class="text-red-600 text-xs mt-1 hidden"></div>
                </div>
                <div>
                    <label for="cp" class="input-label" aria-label="Código Postal">Código Postal</label>
                    <input id="cp" name="cp" type="text" maxlength="5" required class="form-input relative block w-full px-3 py-2 text-gray-900 placeholder-gray-500 border rounded-md appearance-none sm:text-sm" placeholder="41001" aria-required="true">
                    <div id="error-cp" class="text-red-600 text-xs mt-1 hidden"></div>
                </div>
            </div>

            <hr class="my-6">

            <div class="grid grid-cols-1 gap-x-8 gap-y-6 md:grid-cols-2">
                <div>
                    <label for="usuario" class="input-label" aria-label="Nombre de Usuario">Nombre de Usuario</label>
                    <input id="usuario" name="usuario" type="text" required class="form-input relative block w-full px-3 py-2 text-gray-900 placeholder-gray-500 border rounded-md appearance-none sm:text-sm" placeholder="Elige un usuario" aria-required="true">
                    <div id="error-usuario" class="text-red-600 text-xs mt-1 hidden"></div>
                </div>
                <div></div>
                <div class="relative">
                    <label for="clave" class="input-label" aria-label="Contraseña">Contraseña</label>
                    <input id="clave" name="clave" type="password" required class="form-input relative block w-full px-3 py-2 text-gray-900 placeholder-gray-500 border rounded-md appearance-none sm:text-sm pr-10" placeholder="Mínimo 8 caracteres" aria-required="true">
                    <button type="button" id="toggleClave" class="absolute right-2 top-9 text-gray-500" aria-label="Mostrar/Ocultar contraseña">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zm6 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </button>
                    <div id="error-clave" class="text-red-600 text-xs mt-1 hidden"></div>
                </div>
                <div>
                    <label for="confirmar_clave" class="input-label" aria-label="Confirmar Contraseña">Confirmar Contraseña</label>
                    <input id="confirmar_clave" name="confirmar_clave" type="password" required class="form-input relative block w-full px-3 py-2 text-gray-900 placeholder-gray-500 border rounded-md appearance-none sm:text-sm" placeholder="Repite la contraseña" aria-required="true">
                    <div id="error-confirmar_clave" class="text-red-600 text-xs mt-1 hidden"></div>
                </div>
            </div>
			<hr class="my-8">
			
			<div class="space-y-4">
			    <h3 class="text-lg font-semibold text-center text-gray-700">Compromiso y Tratamiento de Datos</h3>
			    <a href="Acuerdo-Voluntarios-Grandes-Recogidas.pdf" target="_blank" id="link-compromisos" class="w-full flex items-center justify-center px-4 py-3 font-medium text-white border border-transparent rounded-md btn-secondary">
			        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
			        Leer Acuerdo Voluntarios Grandes Recogidas
			    </a>
			    <a href="Politica-de-proteccion-de-datos-1.pdf" target="_blank" id="link-privacidad" class="w-full flex items-center justify-center px-4 py-3 font-medium text-white border border-transparent rounded-md btn-secondary">
			        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
			        Leer Política de Privacidad de Datos (PDF)
			    </a>
			</div>
			
			<div class="pt-4 mt-4">
			    <label class="flex items-center" id="consent-label">
			        <input type="checkbox" id="consent-checkbox" disabled class="h-5 w-5 text-orange-600 border-gray-300 rounded focus:ring-orange-500 disabled:opacity-50" aria-required="true">
			        <span class="ml-3 text-gray-700">He leído y acepto los compromisos y la política de tratamiento de datos.</span>
			    </label>
			</div>
            <div>
                <button type="submit" id="submit-btn" disabled class="relative flex justify-center w-full px-4 py-3 mt-4 text-sm font-medium text-white border border-transparent rounded-md btn-orange group focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500">
                    <span id="spinner" class="hidden mr-2"><svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg></span>
                    Completar Registro
                </button>
            </div>
        </form>
        
        <div class="text-center">
            <a href="login.html" class="text-sm font-medium text-gray-600 hover:text-orange-500">
                ¿Ya tienes una cuenta? Inicia sesión
            </a>
        </div>
        
        <div id="message" class="hidden p-4 mt-4 text-sm text-center text-white rounded-md"></div>

    </div>

    <script src="js/registro-voluntario.js"></script>
</body>
</html>
