<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignar Turnos - VoluntariosBAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="/VoluntariosBAS/css/style.css">
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        .map-container { height: 400px; width: 100%; }
        .modal-content { max-width: 900px; width: 90%; }
        .btn-primary { background-color: #f97316; color: white; border-radius: 0.375rem; transition: all 0.2s; }
        .btn-primary:hover { background-color: #ea580c; }
        .btn-secondary { background-color: #4b5563; color: white; border-radius: 0.375rem; transition: all 0.2s; }
        .btn-secondary:hover { background-color: #374151; }
        .form-input { border-color: #d1d5db; border-radius: 0.375rem; padding: 0.5rem; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col font-['Montserrat']">

    <!-- Cabecera -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <img src="/VoluntariosBAS/images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo" class="h-12 w-auto">
                <span class="ml-4 text-xl font-bold text-gray-700 uppercase tracking-tight">Gestión de Turnos</span>
            </div>
            <div class="flex items-center space-x-4">
                <span id="user-display" class="hidden md:inline text-sm font-semibold text-gray-500 bg-gray-100 px-4 py-2 rounded-full border border-gray-200">Verificando sesión...</span>
                <a href="#" id="link-modificar-datos" class="px-4 py-2 text-gray-600 hover:text-orange-600 transition-colors font-bold text-sm hidden">Mis datos</a>
                <a href="login.html" id="link-volver" class="px-4 py-2 text-gray-600 hover:text-orange-600 transition-colors font-bold text-sm">Volver</a>
            </div>
        </nav>
    </header>

    <!-- Contenido -->
    <main class="flex-grow container mx-auto px-4 py-8">
        
        <!-- Bloque de Error (Oculto por defecto) -->
        <div id="session-error-block" class="hidden bg-red-100 border-l-4 border-red-500 p-6 rounded-lg mb-8 shadow-md">
            <div class="flex items-center">
                <svg class="h-6 w-6 text-red-600 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                <div>
                    <h2 class="font-bold text-red-800">Error de Carga</h2>
                    <p class="text-red-700 text-sm">No se pudieron cargar los datos necesarios. Por favor, recarga la página o contacta con soporte.</p>
                </div>
            </div>
            <button onclick="window.location.href='login.html'" class="mt-4 px-6 py-2 bg-red-600 text-white rounded-lg font-bold text-sm">Ir al Login</button>
        </div>

        <div id="main-content-block" class="bg-white rounded-xl shadow-lg p-8 mb-8 border-t-4 border-orange-500 opacity-50 pointer-events-none">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-gray-800">Selección de Puntos de Recogida</h1>
                <p class="text-gray-500 text-sm mt-1">
                    Gestionando la inscripción para: <span id="display-usuario-fuerte" class="font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded">...</span>
                </p>
            </div>
            
            <div id="campana-info" class="bg-blue-50 border-l-4 border-blue-500 p-5 mb-8 hidden rounded-r-lg">
                <p class="font-bold text-blue-800 text-lg" id="campana-nombre">Cargando campaña...</p>
                <p class="text-xs text-blue-600 font-bold uppercase tracking-widest mt-1" id="campana-fechas"></p>
            </div>

            <form id="turnosForm" onsubmit="handleGuardar(event)">
                <input type="hidden" id="campanaId" name="campanaId">
                <input type="hidden" id="targetUsuario" name="usuario">

                <div id="turnos-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Los bloques de turnos se generarán dinámicamente -->
                </div>

                <div class="mt-12 flex flex-col md:flex-row justify-end items-center space-y-4 md:space-y-0 md:space-x-4 border-t pt-8 border-gray-100">
                    <button type="submit" id="save-btn" class="w-full md:w-auto btn btn-primary px-12 py-5 shadow-xl shadow-orange-100 text-lg uppercase tracking-widest font-bold">
                        Guardar cambios
                    </button>
                </div>
            </form>
        </div>
    </main>
    
    <!-- Modal del Mapa y Toasts -->
    <div id="map-modal" class="modal-overlay hidden z-50 p-4">
        <div class="modal-content bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="flex justify-between items-center p-6 border-b border-gray-50">
                <h3 class="text-xl font-bold text-gray-800">Ubicaciones Disponibles</h3>
                <button onclick="closeMapModal()" class="text-gray-400 hover:text-gray-600"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            <div id="map" class="map-container bg-gray-50"></div>
            <div class="p-4 text-right bg-gray-50"><button onclick="closeMapModal()" class="btn btn-secondary text-xs px-4 py-2">Cerrar</button></div>
        </div>
    </div>
    <div id="message-toast" class="fixed bottom-8 right-8 hidden px-8 py-5 rounded-2xl shadow-2xl z-50 text-white font-bold"></div>

    <script src="/VoluntariosBAS/js/config.js"></script>
    <script>
        const turnosLabels = ["Viernes Mañana", "Viernes Tarde", "Sábado Mañana", "Sábado Tarde"];
        let targetUsuario = "";
        let sessionUser = null;
        let mapInstance = null;
        let tiendasCache = []; 
        let currentTurnoSelection = 0;

        document.addEventListener('DOMContentLoaded', () => {
            renderTurnosUI();
            initializePage();
        });

        function renderTurnosUI() {
            const container = document.getElementById('turnos-container');
            let html = '';
            for(let i=1; i<=4; i++) {
                html += `
                    <div class="border border-gray-200 rounded-2xl p-6 bg-white hover:shadow-md transition-shadow relative overflow-hidden group">
                        <div class="absolute top-0 left-0 w-1 h-full bg-gray-100 group-hover:bg-orange-400 transition-colors"></div>
                        <h3 class="font-bold text-gray-800 mb-5 flex items-center">
                            <span class="bg-orange-100 text-orange-600 w-8 h-8 rounded-lg inline-flex items-center justify-center mr-3 text-sm font-bold shadow-sm">${i}</span>
                            Turno ${i}: ${turnosLabels[i-1]}
                        </h3>
                        <div class="space-y-5">
                            <div>
                                <div class="bg-gray-50 p-4 border border-gray-200 rounded-xl min-h-[60px] flex items-center justify-between">
                                    <span id="tienda_nombre_${i}" class="text-sm text-gray-500 italic">No hay asignación activa</span>
                                    <button type="button" onclick="clearTienda(${i})" class="text-gray-300 hover:text-red-500 transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                </div>
                                <input type="hidden" id="tienda_${i}" name="tienda_${i}">
                                <button type="button" onclick="openMapModal(${i})" class="mt-3 w-full py-3 bg-gray-800 text-white text-[10px] font-bold rounded-xl hover:bg-orange-600 transition-colors uppercase tracking-widest shadow-sm">BUSCAR EN MAPA</button>
                            </div>
                            <div class="grid grid-cols-4 gap-4">
                                <div class="col-span-1">
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Personas</label>
                                    <input type="number" id="acompanantes_${i}" name="acompanantes_${i}" class="form-input w-full text-center font-bold text-gray-700 bg-white" min="0" value="0">
                                </div>
                                <div class="col-span-3">
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Comentarios</label>
                                    <input type="text" id="comentario_${i}" name="comentario_${i}" class="form-input w-full bg-white" placeholder="...">
                                </div>
                            </div>
                        </div>
                    </div>`;
            }
            container.innerHTML = html;
        }

        async function initializePage() {
            const mainContent = document.getElementById('main-content-block');
            try {
                const [sessionResponse, campanaResponse, tiendasResponse] = await Promise.all([
                    fetch(AppConfig.getUrl('USUARIO_ACTUAL')),
                    fetch(AppConfig.getUrl('CAMPANA_ACTIVA')),
                    fetch(AppConfig.getUrl('TODAS_LAS_TIENDAS'))
                ]);

                if (!sessionResponse.ok) throw new Error(`Error de sesión: ${sessionResponse.statusText}`);
                if (!campanaResponse.ok) throw new Error(`No se pudo cargar la campaña activa.`);
                if (!tiendasResponse.ok) throw new Error(`No se pudieron cargar las tiendas.`);

                sessionUser = await sessionResponse.json();
                const campana = await campanaResponse.json();
                tiendasCache = await tiendasResponse.json();
                
                const params = new URLSearchParams(window.location.search);
                const urlUser = params.get('usuario');
                targetUsuario = (urlUser && sessionUser.isAdmin) ? urlUser : sessionUser.usuario;
                document.getElementById('user-display').textContent = `Conectado: ${sessionUser.usuario}`;
                
                // --- CAMBIO SOLICITADO: Mostrar nombre completo seguido del código ---
                const nombreAMostrar = sessionUser.nombre ? `${sessionUser.nombre} (${targetUsuario})` : targetUsuario;
                document.getElementById('display-usuario-fuerte').textContent = nombreAMostrar;
                // ---------------------------------------------------------------------
                
                document.getElementById('targetUsuario').value = targetUsuario;
                
                const linkVolver = document.getElementById('link-volver');
                if (sessionUser.isAdmin) {
                    linkVolver.href = "admin-voluntarios.html";
                    linkVolver.textContent = "Volver al Listado";
                } else {
                    linkVolver.href = "login.html";
                    linkVolver.textContent = "Volver";
                }

                document.getElementById('campanaId').value = campana.campana;
                document.getElementById('campana-nombre').textContent = campana.denominacion;
                document.getElementById('campana-fechas').textContent = `Periodo: ${campana.fecha1} — ${campana.fecha2}`;
                document.getElementById('campana-info').classList.remove('hidden');

                await loadTurnosUsuario(campana.campana);
                
                mainContent.classList.remove('opacity-50', 'pointer-events-none');
                
            } catch (error) {
                console.error("Fallo en la inicialización de la página:", error);
                const errorBlock = document.getElementById('session-error-block');
                errorBlock.querySelector('h2').textContent = "Error al Cargar la Página";
                errorBlock.querySelector('p').textContent = error.message || "No se pudieron cargar los datos necesarios. Por favor, recarga la página.";
                errorBlock.classList.remove('hidden');
                mainContent.classList.add('hidden');
            }
        }

        async function loadTurnosUsuario(campanaId) {
            try {
                const url = `${AppConfig.getUrl('MIS_TURNOS')}?campana=${campanaId}&usuario=${encodeURIComponent(targetUsuario)}`;
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    for (let i = 1; i <= 4; i++) {
                        let tiendaId = data['Turno' + i];
                        if (tiendaId && tiendaId > 0) updateTiendaDisplay(i, tiendaId);
                        document.getElementById(`comentario_${i}`).value = data['Comentario' + i] || '';
                        document.getElementById(`acompanantes_${i}`).value = data['Acompanantes' + i] || 0;
                    }
                }
            } catch (error) {
                 console.error("Error cargando los turnos del usuario:", error);
            }
        }

        window.openMapModal = function(turno) {
            currentTurnoSelection = turno;
            document.getElementById('map-modal').classList.remove('hidden');

            setTimeout(async () => {
                let center = [37.3891, -5.9845]; // Sevilla
                let zoom = 12;
                let targetStore = null;

                const currentTiendaId = document.getElementById(`tienda_${turno}`).value;
                if (currentTiendaId) {
                    targetStore = tiendasCache.find(t => t.id == currentTiendaId);
                }

                if (!targetStore) {
                    try {
                        const url = `${AppConfig.getUrl('VOLUNTARIO_DETALLES')}?usuario=${encodeURIComponent(targetUsuario)}`;
                        const response = await fetch(url);
                        if (response.ok) {
                            const voluntarioDetails = await response.json();
                            if (voluntarioDetails && voluntarioDetails.tiendaReferencia) {
                                targetStore = tiendasCache.find(t => t.id == voluntarioDetails.tiendaReferencia);
                            }
                        }
                    } catch (error) {
                        console.error('Error al obtener los detalles del voluntario:', error);
                    }
                }
                
                if (targetStore && targetStore.lat && targetStore.lon) {
                    center = [targetStore.lat, targetStore.lon];
                    zoom = 18;
                }

                if (!mapInstance) {
                    mapInstance = L.map('map').setView(center, zoom);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
                } else {
                    mapInstance.setView(center, zoom);
                    mapInstance.invalidateSize();
                }
                renderMarkers();
            }, 200);
        }

        window.closeMapModal = () => document.getElementById('map-modal').classList.add('hidden');

        function renderMarkers() {
            mapInstance.eachLayer((layer) => { if (layer instanceof L.Marker) mapInstance.removeLayer(layer); });
            tiendasCache.forEach(tienda => {
                if (tienda.lat && tienda.lon) {
                    const marker = L.marker([tienda.lat, tienda.lon]).addTo(mapInstance);
                    marker.bindPopup(`<div class='p-2 text-center'><h4 class='font-bold text-sm'>${tienda.nombre}</h4><button onclick='selectTienda(${tienda.id})' class='mt-2 py-1 px-3 bg-orange-500 text-white text-[10px] font-bold rounded'>SELECCIONAR</button></div>`);
                }
            });
        }

        window.selectTienda = (id) => { updateTiendaDisplay(currentTurnoSelection, id); closeMapModal(); };

        // --- MODIFICACIÓN: Mostrar código formateado con 3 dígitos ---
        function updateTiendaDisplay(turno, id) {
            document.getElementById(`tienda_${turno}`).value = id;
            const t = tiendasCache.find(x => x.id == id);
            const el = document.getElementById(`tienda_nombre_${turno}`);
            if (t) { 
                const codigoFormateado = String(t.id).padStart(3, '0');
                el.textContent = `${codigoFormateado} - ${t.nombre}`; 
                el.classList.remove('italic', 'text-gray-500'); 
                el.classList.add('font-bold', 'text-orange-600'); 
            }
        }
        // -------------------------------------------------------------

        window.clearTienda = (turno) => {
            document.getElementById(`tienda_${turno}`).value = "";
            const el = document.getElementById(`tienda_nombre_${turno}`);
            el.textContent = "No hay asignación activa"; el.classList.add('italic', 'text-gray-500'); el.classList.remove('font-bold', 'text-orange-600');
        };

        async function handleGuardar(event) {
            event.preventDefault(); 
            const submitBtn = document.getElementById('save-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'PROCESANDO...';
            try {
                const response = await fetch(AppConfig.getUrl('GUARDAR_TURNOS'), {
                    method: 'POST',
                    body: new URLSearchParams(new FormData(event.target))
                });
                const result = await response.json();
                showToast(result.success ? 'Guardado correctamente.' : 'Error al guardar.', result.success ? 'success' : 'error');
            } catch (error) { showToast('Error de conexión.', 'error'); }
            finally { submitBtn.disabled = false; submitBtn.textContent = 'GUARDAR CAMBIOS'; }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('message-toast');
            toast.textContent = msg;
            toast.className = `fixed bottom-8 right-8 px-10 py-5 rounded-2xl shadow-2xl z-50 text-white font-bold ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }
    </script>
</body>
</html>
