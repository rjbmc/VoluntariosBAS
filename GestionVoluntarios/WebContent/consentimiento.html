<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consentimiento del Voluntario- Banco de Alimentos de Sevilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="/Voluntarios Banco de Alimentos de Sevilla/js/config.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen py-12">

    <div class="w-full max-w-2xl p-8 space-y-8 bg-white rounded-2xl card-shadow m-4">
        <div class="flex justify-center">
            <img src="images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo del Banco de Alimentos de Sevilla" class="w-48 mb-4">
        </div>
        <div class="text-center">
            <h2 class="text-2xl font-bold text-gray-800">Compromiso y Tratamiento de Datos</h2>
            <p class="text-md text-gray-600 mt-2">Antes de continuar, es importante que leas y aceptes los siguientes documentos.</p>
        </div>

        <div class="space-y-4">
            <a href="Acuerdo-Voluntarios-Grandes-Recogidas.pdf" target="_blank" id="link-compromisos" class="w-full flex items-center justify-center px-4 py-3 font-medium text-white border border-transparent rounded-md btn-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                Leer Acuerdo Voluntarios Grandes Recogidas
            </a>
            <a href="Politica-de-proteccion-de-datos-1.pdf" target="_blank" id="link-privacidad" class="w-full flex items-center justify-center px-4 py-3 font-medium text-white border border-transparent rounded-md btn-secondary">
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                Leer Política de Privacidad de Datos (PDF)
            </a>
        </div>

        <div class="pt-4 border-t">
            <label class="flex items-center" id="consent-label">
                <input type="checkbox" id="consent-checkbox" disabled class="h-5 w-5 text-orange-600 border-gray-300 rounded focus:ring-orange-500 disabled:opacity-50">
                <span class="ml-3 text-gray-700">He leído y acepto los compromisos y la política de tratamiento de datos.</span>
            </label>
        </div>

        <div class="pt-6">
            <button id="continue-btn" disabled class="w-full px-4 py-3 font-medium text-white border border-transparent rounded-md btn-primary disabled:opacity-50 disabled:cursor-not-allowed">
                Continuar con el Alta
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const linkCompromisos = document.getElementById('link-compromisos');
            const linkPrivacidad = document.getElementById('link-privacidad');
            const checkbox = document.getElementById('consent-checkbox');
            const continueBtn = document.getElementById('continue-btn');
            
            let haLeidoCompromisos = false;
            let haLeidoPrivacidad = true;

            // Recoger los parámetros de la tienda de la URL
            const urlParams = new URLSearchParams(window.location.search);
            const tiendaId = urlParams.get('tienda_id');
            const tiendaNombre = urlParams.get('tienda_nombre');

            // Función para comprobar si se debe habilitar la casilla
            function checkEnableCheckbox() {
                if (haLeidoCompromisos && haLeidoPrivacidad) {
                    checkbox.disabled = false;
                }
            }

            // Añadir listeners a los enlaces
            linkCompromisos.addEventListener('click', () => {
                haLeidoCompromisos = true;
                checkEnableCheckbox();
            });

            linkPrivacidad.addEventListener('click', () => {
                haLeidoPrivacidad = true;
                checkEnableCheckbox();
            });

            // Habilitar/deshabilitar el botón de continuar cuando cambia la casilla
            checkbox.addEventListener('change', () => {
                continueBtn.disabled = !checkbox.checked;
            });

            // Redirigir al formulario de alta con los datos de la tienda
            continueBtn.addEventListener('click', () => {
                if (checkbox.checked) {
                    // Asegurarse de que los parámetros existen antes de redirigir
                    if (tiendaId && tiendaNombre) {
                        const nextUrl = `nuevo-voluntario.html?tienda_id=${tiendaId}&tienda_nombre=${encodeURIComponent(tiendaNombre)}`;
                        window.location.href = nextUrl;
                    } else {
                        alert("Error: No se ha seleccionado una tienda de referencia. Por favor, vuelve a empezar el proceso.");
                    }
                }
            });
        });
    </script>

</body>
</html>
