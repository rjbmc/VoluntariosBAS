<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecciona un Punto de Recogida - Banco de Alimentos de Sevilla</title>
    
    <!-- Se eliminan las librerías de Leaflet.js -->
    
    <!-- Tailwind CSS y Fuentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/VoluntariosBAS/js/config.js"></script>
    <style>
        /* Estilos personalizados y corporativos */
        :root {
            --banco-orange: #F36C21;
            --banco-dark-blue: #2E3D4C;
            --banco-light-gray: #f0f2f5;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--banco-light-gray);
        }
        .btn-orange {
            background-color: var(--banco-orange);
            transition: background-color 0.3s ease;
        }
        .btn-orange:hover {
            background-color: #d85b1a;
        }
        .btn-orange:disabled {
            background-color: #f3b08a;
            cursor: not-allowed;
        }
        .card-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        #map { 
            height: 400px; 
            width: 100%;
            border-radius: 0.75rem; /* 12px */
            z-index: 0;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen py-12">

    <div class="w-full max-w-4xl p-8 space-y-6 bg-white rounded-2xl card-shadow m-4">
        <div class="text-center">
            <h2 class="text-2xl font-bold text-gray-800">Selecciona tu Punto de Recogida más Cercano</h2>
            <p class="mt-2 text-gray-600">Haz clic en un marcador para ver los detalles y elegir dónde quieres colaborar.</p>
        </div>
        
        <!-- Contenedor del mapa -->
        <div id="map"></div>

        <!-- Panel de información del punto seleccionado -->
        <div id="info-panel" class="p-4 mt-4 text-center bg-gray-100 rounded-lg">
            <h3 id="info-nombre" class="text-lg font-semibold text-gray-800">Selecciona en el mapa la tienda mas conveniente para tí</h3>
            <p id="info-direccion" class="mt-1 text-gray-600"></p>
            <button id="select-button" onclick="confirmarSeleccion()" class="w-full max-w-xs px-4 py-2 mt-4 text-sm font-medium text-white border border-transparent rounded-md btn-orange sm:w-auto" disabled>
                Seleccionar este punto
            </button>
        </div>

        <div class="text-center">
            <a href="login.html" class="text-sm font-medium text-gray-600 hover:text-orange-500">
                &larr; Volver al inicio de sesión
            </a>
        </div>
    </div>

    <!-- Script de Google Maps API -->
    <!-- Reemplaza 'AQUÍ_VA_TU_CLAVE_DE_API_DE_GOOGLE' con tu clave de API de Google Maps -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA4QoCPF-X-OcY3osEV8ofTWWixPdzaeAM&callback=initMap"></script>

    <script>
        let puntoSeleccionado = null;
        let map;
        let infoWindow;

        // La función initMap es llamada por el script de Google Maps una vez que se ha cargado
        function initMap() {
            // Coordenadas para centrar el mapa (Sevilla)
            const sevilla = { lat: 37.3891, lng: -5.9845 };
            
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 12,
                center: sevilla,
            });

            // Creamos una única InfoWindow que se reutilizará para todos los marcadores
            infoWindow = new google.maps.InfoWindow();

            cargarPuntosDeRecogida();
        }

        async function cargarPuntosDeRecogida() {
            try {
                const response = await fetch('../puntos-recogida');
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }
                const puntos = await response.json();
                
                puntos.forEach(punto => {
                    const marker = new google.maps.Marker({
                        position: { lat: punto.lat, lng: punto.lon },
                        map: map,
                        title: punto.nombre,
                    });

                    // Añadimos un listener para el evento 'click' en cada marcador
                    marker.addListener('click', () => {
                        const contentString = `<b>${punto.nombre}</b><br>${punto.direccion}`;
                        infoWindow.setContent(contentString);
                        infoWindow.open(map, marker);
                        
                        // Actualizamos el panel inferior con la información del punto
                        actualizarPanel(punto);
                    });
                });

            } catch (error) {
                console.error("Error al cargar los puntos de recogida:", error);
                const mapContainer = document.getElementById('map');
                mapContainer.innerHTML = `<div class="flex items-center justify-center h-full bg-red-100 text-red-700 p-4 rounded-lg">
                                              <p>No se pudieron cargar los puntos de recogida. Comprueba la conexión con el servidor.</p>
                                          </div>`;
            }
        }

        function actualizarPanel(punto) {
            puntoSeleccionado = punto;
            
            document.getElementById('info-nombre').textContent = punto.nombre;
            document.getElementById('info-direccion').textContent = punto.direccion;
            document.getElementById('select-button').disabled = false;
        }

        function confirmarSeleccion() {
            if (puntoSeleccionado) {
                // Redirigir al formulario de registro pasando el ID del punto como parámetro
                window.location.href = `nuevo-voluntario.html?punto_id=${puntoSeleccionado.id}&punto_nombre=${encodeURIComponent(puntoSeleccionado.nombre)}`;
            }
        }
    </script>
</body>
</html>
