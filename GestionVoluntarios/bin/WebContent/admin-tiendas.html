<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tiendas- Banco de Alimentos de Sevilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/VoluntariosBAS/css/style.css">
    <style>
        /* Estilos adicionales para mejorar la apariencia del modal y los botones */
        .modal-content { max-height: 90vh; overflow-y: auto; }
        .btn-edit {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem; /* 14px */
            font-weight: 600;
        }
        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Cabecera -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <img src="/VoluntariosBAS/images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo" class="h-12 w-auto">
                <span class="ml-4 text-xl font-bold text-gray-700">Gestión de Tiendas</span>
            </div>
            <div>
                <a href="admin.html" class="px-4 py-2 text-gray-600 hover:text-orange-600">Volver al Panel</a>
            </div>
        </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="container mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Tiendas</h1>
            <button onclick="openModal()" class="btn btn-primary">Crear Nueva Tienda</button>
        </div>

        <!-- Filtros -->
        <div class="bg-white p-4 rounded-lg shadow-sm mb-6 flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4 items-center">
            <div class="w-full md:w-1/3">
                <label for="filtro-supervisor" class="input-label">Filtrar por Supervisor:</label>
                <select id="filtro-supervisor" onchange="loadTiendas()" class="form-input">
                    <option value="">Todos los supervisores</option>
                </select>
            </div>
            <div class="w-full md:w-1/3">
                <label for="filtro-zona" class="input-label">Filtrar por Zona:</label>
                <select id="filtro-zona" onchange="loadTiendas()" class="form-input">
                    <option value="">Todas las zonas</option>
                </select>
            </div>
        </div>

        <div id="message-container" class="mb-4"></div>

        <!-- Tabla de Tiendas -->
        <div class="bg-white shadow-md rounded-lg overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Código</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Denominación</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Supervisor</th>
                        <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Disponible</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tiendas-table-body" class="bg-white divide-y divide-gray-200">
                    <!-- Las filas se insertarán aquí dinámicamente -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal para Crear/Editar Tienda -->
    <div id="tienda-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="modal-title" class="text-2xl font-bold mb-6">Nueva Tienda</h3>
            <form id="tienda-form" onsubmit="handleSave(event)">
                <input type="hidden" id="isUpdate" name="isUpdate" value="false">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="codigo" class="input-label">Código</label>
                        <input type="number" id="codigo" name="codigo" class="form-input" required>
                    </div>
                    <div>
                        <label for="denominacion" class="input-label">Denominación</label>
                        <input type="text" id="denominacion" name="denominacion" class="form-input" required>
                    </div>
                    <div class="md:col-span-2">
                        <label for="direccion" class="input-label">Dirección</label>
                        <input type="text" id="direccion" name="direccion" class="form-input" required>
                    </div>
                    <div>
                        <label for="lat" class="input-label">Latitud</label>
                        <input type="text" id="lat" name="lat" class="form-input" required>
                    </div>
                    <div>
                        <label for="lon" class="input-label">Longitud</label>
                        <input type="text" id="lon" name="lon" class="form-input" required>
                    </div>
                     <div>
                        <label for="cp" class="input-label">Código Postal</label>
                        <input type="text" id="cp" name="cp" class="form-input">
                    </div>
                    <div>
                        <label for="poblacion" class="input-label">Población</label>
                        <input type="text" id="poblacion" name="poblacion" class="form-input">
                    </div>
                    <div>
                        <label for="cadena" class="input-label">Cadena</label>
                        <input type="text" id="cadena" name="cadena" class="form-input" required>
                    </div>
                     <div>
                        <label for="prioridad" class="input-label">Prioridad</label>
                        <select id="prioridad" name="prioridad" class="form-input">
                            <option value="1">1 (Alta)</option>
                            <option value="2">2 (Media)</option>
                            <option value="3">3 (Baja)</option>
                        </select>
                    </div>
                    <div>
                        <label for="disponible" class="input-label">Disponible</label>
                        <select id="disponible" name="disponible" class="form-input">
                            <option value="S">Sí</option>
                            <option value="N">No</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <p class="input-label mb-2">Huecos por Turno</p>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                             <div>
                                <label for="huecosTurno1" class="input-label text-sm">Turno 1</label>
                                <input type="number" id="huecosTurno1" name="huecosTurno1" class="form-input" min="0" value="0">
                            </div>
                            <div>
                                <label for="huecosTurno2" class="input-label text-sm">Turno 2</label>
                                <input type="number" id="huecosTurno2" name="huecosTurno2" class="form-input" min="0" value="0">
                            </div>
                            <div>
                                <label for="huecosTurno3" class="input-label text-sm">Turno 3</label>
                                <input type="number" id="huecosTurno3" name="huecosTurno3" class="form-input" min="0" value="0">
                            </div>
                            <div>
                                <label for="huecosTurno4" class="input-label text-sm">Turno 4</label>
                                <input type="number" id="huecosTurno4" name="huecosTurno4" class="form-input" min="0" value="0">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex justify-end space-x-4 mt-8">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Tienda</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/VoluntariosBAS/js/config.js"></script>
    <script>
        let tiendasCache = []; // Almacenar la lista completa de tiendas en memoria

        document.addEventListener('DOMContentLoaded', () => {
            loadFiltros();
            loadTiendas();
        });

        async function loadFiltros() {
            try {
                const response = await fetch(AppConfig.getUrl('ADMIN_FILTROS_TIENDAS'));
                if (!response.ok) throw new Error('Error al cargar datos para filtros');
                const data = await response.json();
                
                const supervisorSelect = document.getElementById('filtro-supervisor');
                data.supervisores.forEach(s => {
                    const option = document.createElement('option');
                    option.value = s;
                    option.textContent = s;
                    supervisorSelect.appendChild(option);
                });

                const zonaSelect = document.getElementById('filtro-zona');
                data.zonas.forEach(z => {
                    const option = document.createElement('option');
                    option.value = z;
                    option.textContent = z;
                    zonaSelect.appendChild(option);
                });
            } catch(error) {
                displayMessage('Error al cargar los filtros.', 'error');
            }
        }

        async function loadTiendas() {
            const supervisor = document.getElementById('filtro-supervisor').value;
            const zona = document.getElementById('filtro-zona').value;
            
            const url = new URL(window.location.origin + AppConfig.getUrl('ADMIN_TIENDAS'));
            if (supervisor) url.searchParams.append('supervisor', supervisor);
            if (zona) url.searchParams.append('zona', zona);

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    if (response.status === 403) window.location.href = 'login.html';
                    throw new Error('Error al cargar las tiendas.');
                }
                const tiendas = await response.json();
                tiendasCache = tiendas; // Guardar en caché
                const tableBody = document.getElementById('tiendas-table-body');
                tableBody.innerHTML = '';

                if (tiendas.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-4">No se encontraron tiendas con los filtros seleccionados.</td></tr>';
                    return;
                }

                tiendas.forEach(t => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${t.codigo}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${t.denominacion}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${t.supervisor}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center">
                            ${t.disponible === 'S' 
                                ? '<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Sí</span>' 
                                : '<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">No</span>'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick='openModal(${t.codigo})' class="btn btn-secondary btn-edit">Editar</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                displayMessage(error.message, 'error');
            }
        }

        function openModal(tiendaCodigo = null) {
            const form = document.getElementById('tienda-form');
            form.reset();
            const modalTitle = document.getElementById('modal-title');
            const codigoInput = document.getElementById('codigo');
            const isUpdateInput = document.getElementById('isUpdate');
            
            document.body.classList.add('modal-open');

            if (tiendaCodigo) { // Modo Edición
                const tienda = tiendasCache.find(t => t.codigo === tiendaCodigo);
                if (!tienda) {
                    displayMessage('No se pudo encontrar la tienda para editar.', 'error');
                    return;
                }

                modalTitle.textContent = 'Editar Tienda';
                isUpdateInput.value = 'true';
                codigoInput.value = tienda.codigo;
                codigoInput.readOnly = true;
                
                document.getElementById('denominacion').value = tienda.denominacion;
                document.getElementById('direccion').value = tienda.direccion;
                document.getElementById('lat').value = tienda.lat;
                document.getElementById('lon').value = tienda.lon;
                document.getElementById('cp').value = tienda.cp;
                document.getElementById('poblacion').value = tienda.poblacion;
                document.getElementById('cadena').value = tienda.cadena;
                document.getElementById('disponible').value = tienda.disponible;
                document.getElementById('prioridad').value = tienda.prioridad;
                document.getElementById('huecosTurno1').value = tienda.huecosTurno1;
                document.getElementById('huecosTurno2').value = tienda.huecosTurno2;
                document.getElementById('huecosTurno3').value = tienda.huecosTurno3;
                document.getElementById('huecosTurno4').value = tienda.huecosTurno4;
            } else { // Modo Creación
                modalTitle.textContent = 'Nueva Tienda';
                isUpdateInput.value = 'false';
                codigoInput.readOnly = false;
            }
            document.getElementById('tienda-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('tienda-modal').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        async function handleSave(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            formData.append('action', 'save');

            try {
                const response = await fetch(AppConfig.getUrl('ADMIN_TIENDAS'), {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });
                const result = await response.json();

                if (result.success) {
                    displayMessage('Tienda guardada correctamente.', 'success');
                    closeModal();
                    loadTiendas(); 
                } else {
                    displayMessage(result.message || 'Error desconocido al guardar la tienda.', 'error');
                }
            } catch (error) {
                displayMessage('Error de conexión con el servidor.', 'error');
            }
        }

        function displayMessage(msg, type) {
            const container = document.getElementById('message-container');
            const colors = { success: 'bg-green-100 text-green-700', error: 'bg-red-100 text-red-700', info: 'bg-blue-100 text-blue-700' };
            container.innerHTML = `<div class="${colors[type]} p-4 rounded-md">${msg}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
