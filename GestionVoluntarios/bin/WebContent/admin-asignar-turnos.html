<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignaciones de Turnos - VoluntariosBAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/VoluntariosBAS/css/style.css">
    <style>
        .turno-cell { min-width: 200px; }
        .comentario-text { font-size: 0.75rem; color: #666; margin-top: 2px; display: block; font-style: italic;}
    </style>
</head>
<body class="min-h-screen bg-gray-50">

    <!-- Cabecera -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <img src="/VoluntariosBAS/images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo" class="h-12 w-auto">
                <span class="ml-4 text-xl font-bold text-gray-700">Gestión de Asignaciones</span>
            </div>
            <div>
                <a href="admin.html" class="px-4 py-2 text-gray-600 hover:text-orange-600 transition-colors">Volver al Panel</a>
            </div>
        </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="container mx-auto px-6 py-8">
        
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Asignaciones por Voluntario</h1>
            <div class="space-x-2">
                <button onclick="loadAsignaciones()" class="btn btn-secondary text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg> Actualizar
                </button>
                <a href="admin-resumen.html" class="btn btn-primary text-sm">Ver Resumen por Tienda</a>
            </div>
        </div>

        <div id="message-container" class="mb-4 hidden"></div>

        <!-- Tabla -->
        <div class="bg-white shadow-lg rounded-lg overflow-x-auto border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider sticky left-0 bg-gray-50 z-10">Voluntario</th>
                        <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Turno 1</th>
                        <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Turno 2</th>
                        <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Turno 3</th>
                        <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Turno 4</th>
                        <th class="px-4 py-3 text-center text-xs font-bold text-gray-500 uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody id="asignaciones-table-body" class="bg-white divide-y divide-gray-200 text-sm">
                    <tr><td colspan="6" class="text-center py-8 text-gray-500">Cargando datos...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Editar (Simplificado para el ejemplo, redirige a lógica específica si es necesario) -->
    <!-- En una implementación real, aquí iría el formulario de edición de admin -->

    <script src="/VoluntariosBAS/js/config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadAsignaciones();
        });

        async function loadAsignaciones() {
            const tableBody = document.getElementById('asignaciones-table-body');
            
            try {
                // Usamos AppConfig si existe, si no, url directa
                let baseUrl = '/VoluntariosBAS/admin-asignaciones';
                try { if(typeof AppConfig !== 'undefined') baseUrl = AppConfig.getUrl('ADMIN_ASIGNACIONES'); } catch(e){}

                const response = await fetch(baseUrl);
                if (!response.ok) {
                    if (response.status === 403) window.location.href = 'login.html';
                    throw new Error('Error al cargar datos.');
                }

                const data = await response.json();
                renderTable(data);

            } catch (error) {
                console.error(error);
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-red-600">Error cargando asignaciones.</td></tr>`;
            }
        }

        function renderTable(asignaciones) {
            const tableBody = document.getElementById('asignaciones-table-body');
            tableBody.innerHTML = '';

            if (!asignaciones || asignaciones.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">No hay asignaciones registradas.</td></tr>';
                return;
            }

            asignaciones.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";
                
                // Función helper para generar la celda de turno
                const renderTurno = (tienda, comentario, acompanantes) => {
                    if (!tienda) return '<span class="text-gray-300">-</span>';
                    
                    let html = `<div class="font-medium text-gray-800">${tienda}</div>`;
                    
                    // MODIFICADO: Mostrar número de acompañantes en texto explícito si existen
                    if (acompanantes && acompanantes > 0) {
                        html += `<div class="text-xs text-blue-700 font-semibold mt-1">Acompañantes: ${acompanantes}</div>`;
                    }
                    
                    if (comentario) {
                        html += `<div class="comentario-text" title="${comentario}">${comentario.substring(0, 30)}${comentario.length > 30 ? '...' : ''}</div>`;
                    }
                    return html;
                };

                tr.innerHTML = `
                    <td class="px-4 py-4 whitespace-nowrap sticky left-0 bg-white z-10 border-r border-gray-100">
                        <div class="text-sm font-bold text-gray-900">${row.apellidos}, ${row.nombre}</div>
                        <div class="text-xs text-gray-500">${row.usuario}</div>
                    </td>
                    <td class="px-4 py-4 align-top turno-cell border-r border-gray-50">
                        ${renderTurno(row.tiendaTurno1, row.comentario1, row.Acompanantes1)}
                    </td>
                    <td class="px-4 py-4 align-top turno-cell border-r border-gray-50">
                        ${renderTurno(row.tiendaTurno2, row.comentario2, row.Acompanantes2)}
                    </td>
                    <td class="px-4 py-4 align-top turno-cell border-r border-gray-50">
                        ${renderTurno(row.tiendaTurno3, row.comentario3, row.Acompanantes3)}
                    </td>
                    <td class="px-4 py-4 align-top turno-cell border-r border-gray-50">
                        ${renderTurno(row.tiendaTurno4, row.comentario4, row.Acompanantes4)}
                    </td>
                    <td class="px-4 py-4 text-center align-middle">
                        <button onclick="alert('Funcionalidad de edición pendiente')" class="text-blue-600 hover:text-blue-900 text-xs font-semibold uppercase">Editar</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
