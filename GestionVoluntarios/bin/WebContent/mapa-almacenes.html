<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecciona tu Tienda- Banco de Alimentos de Sevilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="/VoluntariosBAS/js/config.js"></script>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Cabecera -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <img src="images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo" class="h-12 w-auto">
            </div>
            <div>
                <a href="login.html" class="px-4 py-2 text-gray-600 hover:text-orange-600">Volver al Login</a>
            </div>
        </nav>
    </header>
    
    <!-- Contenido Principal -->
    <main class="flex-grow container mx-auto px-6 py-12 flex flex-col">
	    <div class="text-center mb-8">
	        <h1 class="text-3xl font-bold text-gray-800">Selecciona tu Tienda de Referencia</h1>
	        <p class="text-md text-gray-600 mt-2">Elige en el mapa la tienda a la que te gustaría estar vinculado/a.</p>
	    </div>
	    <div id="selection-panel" class="hidden mt-6 bg-white p-4 rounded-lg shadow-md flex items-center justify-between">
	        <div>
	            <p class="text-sm text-gray-500">Tienda seleccionada:</p>
	            <p id="selected-store-name" class="font-bold text-lg text-gray-800"></p>
	        </div>
	        <button onclick="confirmarSeleccion()" id="confirm-button" class="btn btn-primary">
	            Confirmar y Continuar
	        </button>
	    </div>
	    <div id="map" class="flex-grow w-full rounded-lg shadow-lg mt-6"></div> 
    </main>
    
    <script>
        let map;
        let selectedStore = null;

        document.addEventListener('DOMContentLoaded', async () => {
            map = L.map('map').setView([37.3891, -5.9845], 12); // Centrado en Sevilla
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            try {
                const response = await fetch(AppConfig.getUrl('TODAS_LAS_TIENDAS'));
                if (!response.ok) {
                    throw new Error('No se pudieron cargar las tiendas.');
                }
                const tiendas = await response.json();
                tiendas.forEach(tienda => {
                    const marker = L.marker([tienda.lat, tienda.lon]).addTo(map);
                    marker.bindPopup(`<b>${tienda.nombre}</b><br>${tienda.direccion}`);
                    marker.on('click', () => {
                        selectedStore = { id: tienda.id, nombre: tienda.nombre };
                        document.getElementById('selected-store-name').textContent = tienda.nombre;
                        document.getElementById('selection-panel').classList.remove('hidden');
                        map.invalidateSize();
                    });
                });
            } catch (error) {
                console.error(error);
                alert('Hubo un error al cargar las tiendas. Por favor, inténtalo más tarde.');
            }
        });

        function confirmarSeleccion() {
            if (selectedStore) {
                const url = `nuevo-voluntario.html?tienda_id=${selectedStore.id}&tienda_nombre=${encodeURIComponent(selectedStore.nombre)}`;
                window.location.href = url;
            }
        }
    </script>
</body>
</html>
