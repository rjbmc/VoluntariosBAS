<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestiÃ³n de Voluntarios - Banco de Alimentos de Sevilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Enlace a la hoja de estilos comÃºn -->
    <link rel="stylesheet" href="css/style.css">
    <script src="/VoluntariosBAS/js/config.js"></script>
</head>
<body class="min-h-screen">

    <!-- Cabecera -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <img src="images/Logotipo-fundacion-banco-de-alimentos-de-sevilla.png" alt="Logo" class="h-12 w-auto">
                <span class="ml-4 text-xl font-bold text-gray-700">GestiÃ³n de Voluntarios</span>
            </div>
            <div>
                <a href="admin.html" class="px-4 py-2 text-gray-600 hover:text-orange-600">Volver al Panel</a>
            </div>
        </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="container mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Voluntarios</h1>
        </div>

        <div id="message-container" class="mb-4"></div>

        <!-- Tabla de Voluntarios -->
        <div class="bg-white shadow-md rounded-lg overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre Completo</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Contacto</th>
                        <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Administrador</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody id="voluntarios-table-body" class="bg-white divide-y divide-gray-200">
                    <!-- Las filas se insertarÃ¡n aquÃ­ dinÃ¡micamente -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal para Editar Voluntario -->
    <div id="voluntario-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="modal-title" class="text-2xl font-bold mb-6">Editar Voluntario</h3>
            <form id="voluntario-form" onsubmit="handleSave(event)">
                <input type="hidden" id="usuario" name="usuario">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2">
                        <label for="nombre" class="input-label">Nombre</label>
                        <input type="text" id="nombre" name="nombre" class="form-input" required>
                    </div>
                    <div class="md:col-span-2">
                        <label for="apellidos" class="input-label">Apellidos</label>
                        <input type="text" id="apellidos" name="apellidos" class="form-input" required>
                    </div>
                    <div class="md:col-span-2">
                        <label for="dni" class="input-label">DNI / NIF</label>
                        <input type="text" id="dni" name="dni" class="form-input" required>
                    </div>
                    <div class="md:col-span-2">
                        <label for="telefono" class="input-label">TelÃ©fono</label>
                        <input type="tel" id="telefono" name="telefono" class="form-input" required>
                    </div>
                    <div class="md:col-span-3">
                        <label for="email" class="input-label">Email</label>
                        <input type="email" id="email" name="email" class="form-input w-full" required>
                    </div>
                    <div class="md:col-span-2">
                        <label for="fechaNacimiento" class="input-label">Fecha Nacimiento</label>
                        <input type="date" id="fechaNacimiento" name="fechaNacimiento" class="form-input" required>
                    </div>
                    <div class="md:col-span-2">
                        <label for="cp" class="input-label">CÃ³digo Postal</label>
                        <input type="text" id="cp" name="cp" class="form-input" required>
                    </div>
                </div>
                <div class="flex justify-end space-x-4 mt-8">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        let voluntariosData = {};

        document.addEventListener('DOMContentLoaded', loadVoluntarios);

        async function loadVoluntarios() {
            try {
                const response = await fetch(AppConfig.getUrl('ADMIN_VOLUNTARIOS'));
                if (!response.ok) {
                    if (response.status === 403) window.location.href = 'login.html';
                    throw new Error('Error al cargar los voluntarios.');
                }
                const voluntarios = await response.json();
                const tableBody = document.getElementById('voluntarios-table-body');
                tableBody.innerHTML = '';
                voluntariosData = {};

                if (voluntarios.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" class="text-center py-4">No hay voluntarios registrados.</td></tr>';
                    return;
                }

                voluntarios.forEach(v => {
                    voluntariosData[v.usuario] = v;
                    const tr = document.createElement('tr');
                    const isAdminChecked = v.esAdmin === 'S' ? 'checked' : '';
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-medium text-gray-900">${v.apellidos}, ${v.nombre}</div>
                            <div class="text-sm text-gray-500">Usuario: ${v.usuario} | DNI: ${v.dni}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${v.email}</div>
                            <div class="text-sm text-gray-500">${v.telefono}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-center">
                            <label class="switch">
                                <input type="checkbox" onchange="handleToggleAdmin('${v.usuario}', this.checked)" ${isAdminChecked}>
                                <span class="slider round"></span>
                            </label>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                            <button onclick="openModal('${v.usuario}')" class="btn btn-secondary">Editar</button>
                            <a href="admin-asignar-turnos.html?usuario=${encodeURIComponent(v.usuario)}" class="btn btn-primary">Asignar Turnos</a>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                displayMessage(error.message, 'error');
            }
        }

        function openModal(usuarioId) {
            const voluntario = voluntariosData[usuarioId];
            if (!voluntario) {
                displayMessage('Error: No se encontraron los datos del voluntario.', 'error');
                return;
            }

            document.getElementById('modal-title').textContent = `Editar Voluntario: ${voluntario.usuario}`;
            document.getElementById('usuario').value = voluntario.usuario;
            document.getElementById('nombre').value = voluntario.nombre;
            document.getElementById('apellidos').value = voluntario.apellidos;
            document.getElementById('dni').value = voluntario.dni;
            document.getElementById('email').value = voluntario.email;
            document.getElementById('telefono').value = voluntario.telefono;
            document.getElementById('cp').value = voluntario.cp;
            document.getElementById('fechaNacimiento').value = voluntario.fechaNacimiento;
            
            document.getElementById('voluntario-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('voluntario-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        async function handleSave(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            formData.append('action', 'save');

            try {
                const response = await fetch(AppConfig.getUrl('ADMIN_VOLUNTARIOS'), {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });
                const result = await response.json();
                if (response.ok) {
                    displayMessage(result.message, 'success');
                    closeModal();
                    loadVoluntarios();
                } else {
                    throw new Error(result.message || 'Error desconocido');
                }
            } catch (error) {
                displayMessage(error.message, 'error');
            }
        }

        async function handleToggleAdmin(usuario, esAdmin) {
            const newAdminStatus = esAdmin ? 'S' : 'N';
            
            const formData = new URLSearchParams();
            formData.append('action', 'toggleAdmin');
            formData.append('usuario', usuario);
            formData.append('esAdmin', newAdminStatus);

            try {
                const response = await fetch(AppConfig.getUrl('ADMIN_VOLUNTARIOS'), {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    displayMessage(result.message, 'success');
                } else {
                    throw new Error(result.message || 'Error desconocido');
                }
            } catch (error) {
                displayMessage(error.message, 'error');
                loadVoluntarios(); 
            }
        }

        function displayMessage(msg, type) {
            const container = document.getElementById('message-container');
            const colors = {
                success: 'bg-green-100 border-green-400 text-green-700',
                error: 'bg-red-100 border-red-400 text-red-700'
            };
            container.innerHTML = `<div class="border px-4 py-3 rounded relative ${colors[type]}" role="alert">
                                       <span class="block sm:inline">${msg}</span>
                                   </div>`;
            setTimeout(() => container.innerHTML = '', 4000);
        }
    </script>
</body>
</html>
